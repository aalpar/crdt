name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ["1.25"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Build
        run: make build

      - name: Vet
        run: make vet

      - name: Format check
        run: make fmt-check

      - name: Test
        run: make test

      - name: Test (race detector)
        run: make test-race

      - name: Install benchstat
        run: go install golang.org/x/perf/cmd/benchstat@latest

      - name: Run benchmarks
        run: go test -run='^$' -bench=. -benchmem -count=5 ./... | tee bench-new.txt

      - name: Compare to baseline
        run: |
          if [ -f benchmarks/baseline.txt ]; then
            echo "## Benchmark Comparison" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            benchstat benchmarks/baseline.txt bench-new.txt | tee -a "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No baseline found, skipping comparison."
          fi

      - name: Update baseline
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        run: |
          mkdir -p benchmarks
          cp bench-new.txt benchmarks/baseline.txt
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add benchmarks/baseline.txt
          git diff --cached --quiet || (git commit -m "ci: update benchmark baseline" && git push)
